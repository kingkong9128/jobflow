<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      min-height: 400px;
      background: #f9fafb;
    }
    
    .header {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 16px;
    }
    
    .auth-section {
      display: none;
    }
    
    .auth-section.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }
    
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn-primary {
      background: #4F46E5;
      color: white;
    }
    
    .btn-primary:hover {
      background: #4338ca;
    }
    
    .btn-primary:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #d1d5db;
    }
    
    .error {
      background: #fef2f2;
      color: #dc2626;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: #4F46E5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }
    
    .user-details h3 {
      font-size: 14px;
      font-weight: 500;
      color: #111827;
    }
    
    .user-details p {
      font-size: 12px;
      color: #6b7280;
    }
    
    .cv-preview {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .cv-preview h4 {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 8px;
    }
    
    .cv-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    
    .cv-field:last-child {
      border-bottom: none;
    }
    
    .cv-field-icon {
      width: 24px;
      height: 24px;
      background: #eef2ff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4F46E5;
      font-size: 12px;
    }
    
    .cv-field-content {
      flex: 1;
    }
    
    .cv-field-label {
      font-size: 10px;
      color: #9ca3af;
    }
    
    .cv-field-value {
      font-size: 13px;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fef9c3;
      border-radius: 6px;
      font-size: 12px;
      color: #854d0e;
      margin-bottom: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ca8a04;
    }
    
    .fill-btn {
      margin-bottom: 8px;
    }
    
    .site-warning {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      margin-bottom: 12px;
    }
    
    .site-warning p {
      font-size: 12px;
      color: #dc2626;
    }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .footer a {
      font-size: 12px;
      color: #6b7280;
      text-decoration: none;
    }
    
    .footer a:hover {
      color: #4F46E5;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #4F46E5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .success-icon {
      width: 48px;
      height: 48px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 24px auto;
      color: #16a34a;
      font-size: 24px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #111827;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobFlow</h1>
    <p>Auto-fill job applications</p>
  </div>
  
  <div class="content" id="app">
    <div class="loading">
      <div class="spinner"></div>
    </div>
  </div>
  
  <div class="footer">
    <a href="#" id="openDashboard">Open Dashboard</a>
    <a href="#" id="refreshCV">Refresh CV</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
